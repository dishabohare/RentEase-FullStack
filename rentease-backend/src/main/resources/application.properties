spring.application.name=rentease-backend
server.port=8082

# ===== DATABASE =====
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/rentease_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== JWT =====
# NOTE: In production, move this to an environment variable, never commit to Git
jwt.secret=RentEase2024SuperSecureSecretKeyForHS256JWTTokenGeneration!!
jwt.expiration=86400000

# ===== LOGGING =====
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
